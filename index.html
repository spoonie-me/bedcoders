<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Bedcoders — Learn to Code with AI from Bed</title>
    <meta name="description" content="Bedcoders: Learn coding with AI, Claude API, prompt engineering, and AI tools — designed for remote workers, disabled coders, and anyone building from the comfort of their bed." />
    <meta name="keywords" content="learn to code, AI coding, Claude API, prompt engineering, AI tools, remote coding, disabled coders, coding from bed, AI literacy, build with AI" />
    <meta name="author" content="Bedcoders" />
    <link rel="canonical" href="https://bedcoders.com" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bedcoders.com" />
    <meta property="og:site_name" content="Bedcoders" />
    <meta property="og:title" content="Bedcoders — Learn to Code with AI from Bed" />
    <meta property="og:description" content="Coding courses for the horizontally ambitious. Master AI tools, Claude API, and prompt engineering. Build real things from wherever you are." />
    <meta property="og:image" content="https://bedcoders.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bedcoders" />
    <meta name="twitter:title" content="Bedcoders — Learn to Code with AI from Bed" />
    <meta name="twitter:description" content="Coding courses for the horizontally ambitious. Master AI tools, Claude API, and prompt engineering." />
    <meta name="twitter:image" content="https://bedcoders.com/og-image.png" />

    <!-- Structured data (Course + Organisation) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Bedcoders",
      "url": "https://bedcoders.com",
      "description": "Coding with AI courses for remote workers, disabled coders, and anyone who builds from bed.",
      "email": "hello@bedcoders.com",
      "sameAs": ["https://twitter.com/bedcoders"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Bedcoders AI Coding Tracks",
        "itemListElement": [{
          "@type": "Offer",
          "itemOffered": {
            "@type": "Course",
            "name": "Coding with Claude API",
            "description": "Master prompt engineering, Claude API integration, AI tool building, and AI literacy.",
            "provider": { "@type": "Organization", "name": "Bedcoders" },
            "hasCourseInstance": {
              "@type": "CourseInstance",
              "courseMode": "online",
              "inLanguage": "en"
            }
          }
        }]
      }
    }
    </script>

    <!-- Google Analytics 4 -->
    <!-- SETUP: Replace G-XXXXXXXXXX with your GA4 Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // GA4
      gtag('config', 'G-XXXXXXXXXX', { anonymize_ip: true, cookie_flags: 'SameSite=None;Secure' });

      // Helper: fire a GA4 event from anywhere in the app
      window.trackEvent = function(eventName, params) {
        if (typeof gtag === 'function') {
          gtag('event', eventName, params || {});
        }
      };
    </script>

    <!-- Umami Analytics (privacy-first, no cookies, GDPR-compliant) -->
    <!-- SETUP: Replace data-website-id with your Umami website ID from your Umami dashboard -->
    <!-- Self-host: https://umami.is/docs/install  |  Cloud: https://cloud.umami.is -->
    <script
      async
      defer
      src="https://analytics.umami.is/script.js"
      data-website-id="YOUR-UMAMI-WEBSITE-ID"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
